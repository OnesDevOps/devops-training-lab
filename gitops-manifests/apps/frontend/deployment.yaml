# A Deployment manages a set of identical Pods (your application).
# It ensures that the specified number of Pods are running and handles rolling updates.
apiVersion: apps/v1
kind: Deployment
metadata:
  # The name of this deployment
  name: frontend
  labels:
    app: frontend
spec:
  # How many identical copies (Pods) of this application to run initially
  replicas: 1
  # The selector tells the Deployment which Pods belong to it
  selector:
    matchLabels:
      app: frontend
  # The template describes what the Pods will look like
  template:
    metadata:
      labels:
        # These labels must match the selector above!
        app: frontend
    spec:
      containers:
      - name: frontend
        # The Docker image to run. 
        # Note: DOCKER_REGISTRY_IP must be replaced with the actual IP of your private registry (VM 2).
        image: DOCKER_REGISTRY_IP:80/frontend:latest
        # Always pull the latest image tag when starting a new pod
        imagePullPolicy: Always
        ports:
        # The port your NGINX web server listens on inside the container
        - containerPort: 80
        # Resource constraints to ensure this app doesn't consume all node memory/CPU
        resources:
          requests: # Minimum guaranteed resources
            cpu: 50m
            memory: 64Mi
          limits: # Maximum allowed resources before getting throttled or killed
            cpu: 200m
            memory: 128Mi
