# ============================================
# Customer Service Configuration
# ============================================

server:
  port: 8080

spring:
  application:
    name: customer-service

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:customerdb}
    username: ${DB_USER:lab_admin}
    password: ${DB_PASSWORD:changeme_in_production}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- Kafka ---
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: customer-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # --- Jackson ---
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# --- Actuator (K8s probes) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# --- Custom App Config ---
app:
  kafka:
    topic:
      customer-events: customer-events
      lab-events: lab-events
  cache:
    ttl-minutes: 10
