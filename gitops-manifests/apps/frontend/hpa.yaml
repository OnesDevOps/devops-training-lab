# A HorizontalPodAutoscaler (HPA) automatically scales the number of Pods
# in a Deployment based on observed CPU utilization.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
spec:
  # The target deployment that the HPA will scale up or down
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  # The minimum number of pods to keep running at all times
  minReplicas: 1
  # The absolute maximum number of pods to scale out to during a traffic spike
  maxReplicas: 2
  # The metrics that trigger a scaling event
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        # If the average CPU usage across all pods exceeds 75% of their requested CPU, it scales up!
        averageUtilization: 75
